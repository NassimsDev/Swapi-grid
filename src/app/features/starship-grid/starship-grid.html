<div class="flex h-dvh w-full flex-col">
  <header class="flex flex-wrap items-center gap-4 border-b border-gray-200 p-4">
    <h1 class="text-xl font-semibold">Star Wars Fleet</h1>
    <input
      type="search"
      placeholder="Search starships by name"
      class="w-64 rounded border border-gray-300 px-3 py-1.5 text-sm"
      (input)="onSearchInputChange($event)"
    />
  </header>

  <div class="relative flex-1 overflow-x-auto">
    @if (isLoading()) {
      <div class="absolute inset-0 z-10 flex items-center justify-center bg-white/60">
        <div class="h-8 w-8 animate-spin rounded-full border-2 border-gray-300 border-t-gray-600"></div>
      </div>
    } @else if (hasError()) {
      <div class="absolute inset-0 z-20 flex flex-col items-center justify-center gap-3 bg-white">
        <p class="text-sm text-gray-700">Failed to load starships. Please try again.</p>
        <button
          type="button"
          class="rounded border border-gray-300 px-3 py-1.5 text-sm hover:bg-gray-50"
          (click)="onRetry()"
        >
          Retry
        </button>
      </div>
    }
    <ag-grid-angular
      class="ag-theme-alpine h-full w-full"
      [columnDefs]="colDefs"
      [defaultColDef]="defaultColDef"
      [rowModelType]="'infinite'"
      [datasource]="dataSource"
      [cacheBlockSize]="cacheBlockSize"
      [theme]="'legacy'"
      [animateRows]="false"
      (gridReady)="onGridReady($event)"
      (cellValueChanged)="onCellValueChanged($event)"
      (bodyScrollEnd)="onBodyScrollEnd()"
    />
  </div>

  @if (reachedEnd()) {
    <footer class="border-t border-gray-200 px-4 py-2 text-center text-xs text-gray-500 ">
      End of list — {{ totalCount() }} starship{{ totalCount() === 1 ? '' : 's' }} total
    </footer>
  }
</div>
